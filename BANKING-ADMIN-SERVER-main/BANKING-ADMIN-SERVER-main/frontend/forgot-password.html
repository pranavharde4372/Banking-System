<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body { font-family: sans-serif; max-width: 350px; margin: 50px auto; padding: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: orange; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ffcc80; cursor: not-allowed; }
        .nav-link { display: inline-block; margin-top: 20px; text-decoration: none; color: #0056b3; }
        #message { margin-top: 15px; font-weight: bold; }
        .error { color: #d9534f; }
        .success { color: #28a745; }
    </style>
</head>
<body>

    <h2>🔐 Reset Password</h2>
    
    <form id="resetPasswordForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Minimum 6 characters" minlength="6" required>
        </div>
        
        <button type="submit" id="submitBtn">Reset Password</button>
    </form>

    <p id="message"></p>

    <a href="index.html" class="nav-link">Back to Login</a>

    <script>
        document.getElementById("resetPasswordForm").addEventListener("submit", async function(e) {
            e.preventDefault(); // Stop page reload
            
            const submitBtn = document.getElementById("submitBtn");
            const messageEl = document.getElementById("message");
            
            const username = document.getElementById("username").value;
            const newPassword = document.getElementById("newPassword").value;

            // UI Reset & Loading State
            submitBtn.disabled = true;
            submitBtn.innerText = "Resetting...";
            messageEl.className = "";
            messageEl.innerText = "";

            try {
                let response = await fetch("http://localhost:8080/api/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, newPassword })
                });

                let resultText = await response.text();

                if (resultText === "SUCCESS") {
                    messageEl.className = "success";
                    messageEl.innerText = "✅ Password reset successfully! Redirecting...";
                    
                    // Delay the redirect slightly so the user can actually see the success message
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 2000);
                } else {
                    messageEl.className = "error";
                    messageEl.innerText = "❌ User not found or request invalid.";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Reset Password";
                }
                
            } catch (error) {
                console.error("Connection error:", error);
                messageEl.className = "error";
                messageEl.innerText = "❌ Unable to reach the server. Please check your connection.";
                submitBtn.disabled = false;
                submitBtn.innerText = "Reset Password";
            }
        });
    </script>
</body>
</html>
